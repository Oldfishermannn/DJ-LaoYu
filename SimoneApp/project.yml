name: Simone
options:
  bundleIdPrefix: com.simone
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
targets:
  Simone:
    type: application
    platform: [macOS, iOS]
    sources: [Simone]
    settings:
      base:
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_UIBackgroundModes: audio
    entitlements:
      properties:
        com.apple.security.network.client: true
  SimoneTests:
    type: bundle.unit-test
    platform: macOS
    sources: [SimoneTests]
    dependencies:
      - target: Simone
